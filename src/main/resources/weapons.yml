# =====================================
# OxygenHeist weapon type configuration
# =====================================
#
# Each top-level key is a weapon id matching the handler registered in code
#
# Weapons marked enabled: false are not registered at startup

claw_cannon:
  enabled: true
  cooldown-ms: 3000
  damage: 8.0
  explosion-radius: 4.0
  launch-speed: 2.5
  launch-y: 0.8
  melee-knockback: 2.0
  melee-knockback-y: 0.5
  frames:
    idle: "oxygenheist:claw_cannon"
    launch: "oxygenheist:claw_cannon_launch"
  sounds:
    fire:
      dragon:
        sound: "entity.ender_dragon.flap"
        volume: 1.5
        pitch: 1.2
      rocket:
        sound: "entity.firework_rocket.launch"
        volume: 1.5
        pitch: 0.8
    melee:
      sound: "entity.iron_golem.hurt"
      volume: 1.0
      pitch: 1.5
    land:
      explode:
        sound: "entity.generic.explode"
        volume: 2.5
        pitch: 0.7
      fireball:
        sound: "entity.dragon_fireball.explode"
        volume: 2.0
        pitch: 0.9
      anvil:
        sound: "block.anvil.land"
        volume: 1.5
        pitch: 0.5

